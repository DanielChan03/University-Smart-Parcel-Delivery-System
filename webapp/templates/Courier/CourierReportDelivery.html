{% extends "Courier/CourierBase.html" %}

{% block title %}Report Parcel Issue{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='Couriercss/CourierReport.css') }}">
{% endblock %}

{% block content %}
  <div class="container">
    <div class="panel">
      <h2>Report Delivery Issue</h2>
      <form class="report-form" action="{{ url_for('report_parcel_issue.report_parcel') }}" method="POST">
        <!-- Parcel ID -->
        <label for="parcel_id">Parcel ID:</label>
        <input type="text" id="parcel_id" name="parcel_id" placeholder="Enter Parcel ID" required>

        <!-- Issue Type -->
        <label>Issue Type:</label>
        <div class="issue-type">
          <label><input type="radio" name="issue_type" value="damaged" required> Damaged Parcel</label>
          <label><input type="radio" name="issue_type" value="lost"> Lost Parcel</label>
          <label><input type="radio" name="issue_type" value="delayed"> Delayed Delivery</label>
          <label><input type="radio" name="issue_type" value="other" id="otherIssue"> Other:</label> 
          <input type="text" id="otherDescription" name="other_description" placeholder="Enter Issue" style="display: none;" maxlength="25">
        </div>

        <!-- Issue Description -->
        <label for="issue_description">Issue Description:</label>
        <textarea id="issue_description" name="issue_description" placeholder="Describe the issue..." required></textarea>

        <!-- Submit Button -->
        <button type="submit">Submit Report</button>
      </form>
    </div>
  </div>

 <!-- "View Reported History" Button -->
 <button class="view-history-button" onclick="goBack()">View Reported History</button>

  <script>
   document.querySelectorAll('input[name="issue_type"]').forEach((radio) => {
    radio.addEventListener('change', function () {
      const otherDescription = document.getElementById('otherDescription');
      if (document.getElementById('otherIssue').checked) {
        otherDescription.style.display = 'inline'; // Show input field
        otherDescription.required = true; // Make required
      } else {
        otherDescription.style.display = 'none'; // Hide input field when other options are selected
        otherDescription.required = false;
        otherDescription.value = ''; // Clear the input field when hidden
      }
    });
  });
  document.getElementById('otherDescription').addEventListener('input', function () {
    if (this.value.length > 25) {
      this.value = this.value.substring(0, 25); // Trim excess characters
    }
  });

  function goBack() {
            window.location.href = "{{ url_for('view_reported_history.viewReportedHistory') }}";
        
    }
  </script>
{% endblock %}
